<div class="app-container d-flex flex-column min-vh-100">

<ng-container *ngIf="isUserLoggedIn; else loginTemplate">
  <app-side-nav-bar (sidebarToggle)="onSidebarToggle($event)"></app-side-nav-bar>

  <main class="main-content" [class.sidebar-collapsed]="sidebarCollapsed()">
    
    <div class="mobile-header d-lg-none">
      <button class="menu-toggle" (click)="toggleMobileSidebar()">
        <i class="bx bx-menu"></i>
      </button>
      <span class="app-title">MyApp</span>
    </div>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</ng-container>

<ng-template #loginTemplate>
  <router-outlet></router-outlet>
</ng-template>

</div>
