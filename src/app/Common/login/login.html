
<div class="login-container">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header text-center mb-4">
        <div class="login-logo mb-3">
          <i class="bx bx-shield-quarter display-1 text-primary"></i>
        </div>
        <h2 class="login-title fw-bold mb-1">Welcome Back</h2>
        <p class="login-subtitle text-muted">Sign in to continue to your account</p>
      </div>
      <form (ngSubmit)="onSubmit()" [formGroup]="form" class="login-form">
        <div class="form-group mb-3">
          <label for="email" class="form-label fw-semibold">
            <i class="bx bx-envelope me-1"></i> Email Address
            <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <input 
              id="email" 
              type="email" 
              formControlName="email" 
              class="form-control form-control-lg" 
              placeholder="Enter your email"
              [ngClass]="{ 'is-invalid': (f['email'].dirty || f['email'].touched) && f['email'].errors }"
              autocomplete="email">
            <span class="input-group-text bg-light">
              <i class="bx bx-at"></i>
            </span>
          </div>
          <div class="invalid-feedback d-block" *ngIf="(f['email'].dirty || f['email'].touched) && f['email'].errors">
            <small *ngIf="f['email'].errors['required']">
              <i class="bx bx-error-circle me-1"></i> Email is required
            </small>
            <small *ngIf="f['email'].errors['email']">
              <i class="bx bx-error-circle me-1"></i> Please enter a valid email
            </small>
          </div>
        </div>
        <div class="form-group mb-3">
          <label for="password" class="form-label fw-semibold">
            <i class="bx bx-lock-alt me-1"></i> Password
            <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <input 
              id="password" 
              [type]="showPassword ? 'text' : 'password'" 
              formControlName="password" 
              class="form-control form-control-lg" 
              placeholder="Enter your password"
              [ngClass]="{ 'is-invalid': (f['password'].dirty || f['password'].touched) && f['password'].errors }"
              autocomplete="current-password">
            <button 
              type="button" 
              class="btn btn-outline-secondary input-group-text" 
              (click)="togglePasswordInput()"
              tabindex="-1">
              <i class="bx" [class.bx-show]="!showPassword" [class.bx-hide]="showPassword"></i>
            </button>
          </div>
          <div class="invalid-feedback d-block" *ngIf="(f['password'].dirty || f['password'].touched) && f['password'].errors">
            <small *ngIf="f['password'].errors['required']">
              <i class="bx bx-error-circle me-1"></i> Password is required
            </small>
            <small *ngIf="f['password'].errors['minlength']">
              <i class="bx bx-error-circle me-1"></i> Password must be at least 6 characters
            </small>
          </div>
        </div>
        <div class="form-check mb-4">
          <input 
            type="checkbox" 
            id="showPassword" 
            class="form-check-input" 
            [checked]="showPassword"
            (change)="togglePasswordInput()">
          <label for="showPassword" class="form-check-label text-muted">
            <i class="bx bx-show me-1"></i> Show password
          </label>
        </div>
        <div class="d-grid mb-3">
          <button 
            type="submit" 
            class="btn btn-primary btn-lg fw-semibold" 
            [disabled]="loading || form.invalid">
            <span class="spinner-border spinner-border-sm me-2" role="status" *ngIf="loading"></span>
            {{ loading ? 'Signing in...' : 'Sign In' }}
            <i class="bx bx-right-arrow-alt ms-2" *ngIf="!loading"></i>
          </button>
        </div>
        <div class="text-center">
          <small class="text-muted">
            Forgot password? 
            <a href="javascript:void(0)" class="text-primary text-decoration-none fw-semibold">Reset here</a>
          </small>
        </div>

      </form>
      <div class="login-footer text-center mt-4 pt-3 border-top">
        <small class="text-muted">
          <i class="bx bx-shield me-1"></i> Secured with JWT Authentication
        </small>
      </div>
    </div>
    <div class="text-center mt-4">
      <small class="text-muted">
        &copy; {{ currentYear }} Your Company. All rights reserved.
      </small>
    </div>

  </div>
</div>
